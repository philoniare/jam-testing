name: "Fuzz: jamzig"

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/jamzig-fuzz.yml'

permissions:
  contents: read
  issues: write

jobs:
  demo:
    uses: ./.github/workflows/demo-source.yml
    with:
      target_name: jamzig
      docker_image: 'docker.io/jamzig/jam-conformance-target:latest'
      mention: boymaas
