name: "Demo (full): jotl"

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/jotl-demo-full.yml'
      - '.github/workflows/demo-source.yml'

permissions:
  contents: read
  issues: write

jobs:
  demo:
    uses: ./.github/workflows/demo-source.yml
    with:
      target_name: jotl
      docker_image: 'ghcr.io/polykrate/jotl:latest'
      docker_memory: '8192m'
      readiness_pattern: 'Listening on'
      spec: full
      num_blocks: 500
      mention: polykrate
