name: "Performance: jamzig"

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/jamzig-performance.yml'

jobs:
  test:
    uses: ./.github/workflows/reusable-picofuzz.yml
    with:
      target_name: jamzig
      docker_image: 'docker.io/jamzig/jam-conformance-target:latest'
