name: "Performance: graymatter"

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/graymatter-performance.yml'

jobs:
  test:
    uses: ./.github/workflows/reusable-picofuzz.yml
    with:
      target_name: graymatter
      docker_image: 'ghcr.io/jambrains/graymatter/gm:conformance-fuzzer-latest'
