name: "Fuzz: jamzilla"

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/jamzilla-fuzz.yml'

permissions:
  contents: read
  issues: write

jobs:
  demo:
    uses: ./.github/workflows/demo-source.yml
    with:
      target_name: jamzilla
      docker_image: 'ghcr.io/ascrivener/jamzilla-tiny:edge'
      docker_cmd: '-socket {TARGET_SOCK}'
      docker_env: 'PVM_MODE=jit'
      mention: ascrivener
