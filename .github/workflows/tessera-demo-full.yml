name: "Demo (full): tessera"

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/tessera-demo-full.yml'
      - '.github/workflows/demo-source.yml'

permissions:
  contents: read
  issues: write

jobs:
  demo:
    uses: ./.github/workflows/demo-source.yml
    with:
      target_name: tessera
      docker_image: 'ghcr.io/chainscore/tessera:latest'
      docker_memory: '8192m'
      spec: full
      num_blocks: 500
      mention: prasad-kumkar
