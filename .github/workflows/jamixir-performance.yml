name: "Performance: jamixir"

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/jamixir-performance.yml'

jobs:
  test:
    uses: ./.github/workflows/reusable-picofuzz.yml
    with:
      target_name: jamixir
      docker_image: 'ghcr.io/jamixir/jamixir:0.7.2'
