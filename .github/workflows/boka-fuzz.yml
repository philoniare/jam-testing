name: "Fuzz: boka"

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/boka-fuzz.yml'

permissions:
  contents: read
  issues: write

jobs:
  demo:
    uses: ./.github/workflows/demo-source.yml
    with:
      target_name: boka
      docker_image: 'acala/boka:latest'
      docker_cmd: 'fuzz target --socket-path {TARGET_SOCK}'
      mention: xlc
