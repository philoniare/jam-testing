name: "Demo (tiny): jamduna"

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/jamduna-demo-tiny.yml'
      - '.github/workflows/demo-source.yml'

permissions:
  contents: read
  issues: write

jobs:
  demo:
    uses: ./.github/workflows/demo-source.yml
    with:
      target_name: jamduna
      docker_image: 'ghcr.io/jam-duna/duna-target:latest'
      spec: tiny
      mention: mkchungs
