name: "Fuzz: jamforge"

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/jamforge-fuzz.yml'

permissions:
  contents: read
  issues: write

jobs:
  graymatter-source:
    strategy:
      fail-fast: false
      matrix:
        include:
          - spec: tiny
            num_blocks: 5000
          - spec: full
            num_blocks: 500
    uses: ./.github/workflows/graymatter-fuzz-source.yml
    with:
      target_name: jamforge
      docker_image: 'ghcr.io/philoniare/jam-forge:latest'
      docker_cmd: '--socket-path {TARGET_SOCK}'
      spec: ${{ matrix.spec }}
      timeout_minutes: 1380
      num_blocks: ${{ matrix.num_blocks }}
      num_runs: 10
      mention: philoniare
