name: "Demo (tiny): jamforge"

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/jamforge-demo-tiny.yml'
      - '.github/workflows/demo-source.yml'

permissions:
  contents: read
  issues: write

jobs:
  demo:
    uses: ./.github/workflows/demo-source.yml
    with:
      target_name: jamforge
      docker_image: 'ghcr.io/philoniare/jam-forge:latest'
      docker_cmd: '--socket-path {TARGET_SOCK}'
      docker_memory: '4096m'
      spec: tiny
      mention: philoniare
