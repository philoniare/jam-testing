name: "Fuzz: jampy"

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/jampy-fuzz.yml'

permissions:
  contents: read
  issues: write

jobs:
  demo:
    uses: ./.github/workflows/demo-source.yml
    with:
      target_name: jampy
      docker_image: 'ghcr.io/dakk/jampy-target:0.7.2'
      docker_cmd: '--sock {TARGET_SOCK}'
      mention: dakk
