name: "Demo (full): vinwolf"

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/vinwolf-demo-full.yml'
      - '.github/workflows/demo-source.yml'

permissions:
  contents: read
  issues: write

jobs:
  demo:
    uses: ./.github/workflows/demo-source.yml
    with:
      target_name: vinwolf
      docker_image: 'ghcr.io/bloppan/vinwolf:latest'
      docker_memory: '8192m'
      readiness_pattern: 'listening on'
      spec: full
      num_blocks: 500
      mention: bloppan
