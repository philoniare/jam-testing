name: "Fuzz: tsjam"

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/tsjam-fuzz.yml'

permissions:
  contents: read
  issues: write

jobs:
  demo:
    uses: ./.github/workflows/demo-source.yml
    with:
      target_name: tsjam
      docker_image: 'ghcr.io/vekexasia/tsjam-target:0.7.2'
      mention: vekexasia
