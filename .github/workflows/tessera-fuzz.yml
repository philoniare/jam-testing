name: "Fuzz: tessera"

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/tessera-fuzz.yml'

permissions:
  contents: read
  issues: write

jobs:
  demo:
    uses: ./.github/workflows/demo-source.yml
    with:
      target_name: tessera
      docker_image: 'ghcr.io/chainscore/tessera:latest'
      mention: prasad-kumkar
