name: "Demo (tiny): jamixir"

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/jamixir-demo-tiny.yml'
      - '.github/workflows/demo-source.yml'

permissions:
  contents: read
  issues: write

jobs:
  demo:
    uses: ./.github/workflows/demo-source.yml
    with:
      target_name: jamixir
      docker_image: 'ghcr.io/jamixir/jamixir:0.7.2'
      spec: tiny
      mention: danicuki
