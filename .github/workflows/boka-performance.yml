name: "Performance: boka"

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/boka-performance.yml'

jobs:
  test:
    uses: ./.github/workflows/reusable-picofuzz.yml
    with:
      target_name: boka
      docker_image: 'acala/boka:latest'
      docker_cmd: 'fuzz target --socket-path {TARGET_SOCK}'
